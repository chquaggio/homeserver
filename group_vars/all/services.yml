---
# Service credentials and config (values resolved from vault.yml)

# Actual Budget
actual_budget: "{{ ACTUAL_BUDGET }}"
actual_password: "{{ ACTUAL_PASSWORD }}"
actual_url: "{{ ACTUAL_URL }}"

# Audiobookshelf
audiobookshelf_key: "{{ AUDIOBOOKSHELF_KEY }}"

# Beszel-agent
ba_key: "{{ BA_KEY }}"
ba_token: "{{ BA_TOKEN }}"
beszel_user: "{{ BESZEL_USER }}"
beszel_password: "{{ BESZEL_PASSWORD }}"
beszel_sid: "{{ BESZEL_SID }}"

# Bazarr
bazarr_key: "{{ BAZARR_KEY }}"

# Postgres
db_password: "{{ DB_PASSWORD }}"
db_name: "{{ DB_NAME }}"
db_user: "{{ DB_USER }}"

# Immich
immich_db_password: "{{ IMMICH_DB_PASSWORD }}"

# Jellyfin / Jellyseerr
jellyfin_key: "{{ JELLYFIN_KEY }}"
jellyseerr_key: "{{ JELLYSEERR_KEY }}"

# Mealie
mealie_key: "{{ MEALIE_KEY }}"

# OpenWebUI / OpenAI
oai_key: "{{ OAI_KEY }}"

# Pi-hole
pihole_password: "{{ PIHOLE_PASSWORD }}"

# *arr
prowlarr_key: "{{ PROWLARR_KEY }}"
radarr_key: "{{ RADARR_KEY }}"
sonarr_key: "{{ SONARR_KEY }}"

# qBittorrent
qb_user: "{{ QB_USER }}"
qb_password: "{{ QB_PASSWORD }}"

# Spesatracker
spesatracker_iper_email: "{{ SPESATRACKER_IPER_EMAIL }}"
spesatracker_iper_psw: "{{ SPESATRACKER_IPER_PSW }}"
spesatracker_iper_store_id: "{{ SPESATRACKER_IPER_STORE_ID }}"

# Telegram notifications
telegram_token: "{{ TELEGRAM_TOKEN }}"
telegram_chat_id: "{{ TELEGRAM_CHAT_ID }}"

# Trilium
trilium_token: "{{ TRILIUM_TOKEN }}"
trilium_url: "{{ TRILIUM_BASE_URL_PROD }}"

# Zerobyte
zerobyte_secret: "{{ ZEROBYTE_SECRET }}"

# --- karuta ---
karuta_db_password: "{{ KARUTA_DB_PASSWORD }}"
karuta_discord_token: "{{ KARUTA_DISCORD_TOKEN }}"
karuta_discord_client_id: "{{ KARUTA_DISCORD_CLIENT_ID }}"
karuta_discord_client_secret: "{{ KARUTA_DISCORD_CLIENT_SECRET }}"
karuta_session_secret: "{{ KARUTA_SESSION_SECRET }}"
# Discord ids for the karuta game (not secrets) — fill with the real guild values
karuta_guild_id: 0
karuta_drop_channel_id: 0
karuta_announce_channel_id: 0
karuta_notify_channel_id: 0
karuta_ping_role_id: 0
