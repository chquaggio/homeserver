---
- name: Configure db
  set_fact:
    db_service:
      name: postgres
      image: postgres:17
      container_name: postgres
      environment:
        - POSTGRES_USER={{ db_user }}
        - POSTGRES_PASSWORD={{ db_password }}
        - POSTGRES_DB={{ db_name }}
      restart: unless-stopped
      ports:
        - 5432:5432
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
        interval: 5s
        timeout: 5s
        retries: 5
      volumes:
        - ./postgres_data:/var/lib/postgresql/data
      networks:
        - qnet
