---
- name: Configure Cloudflared service
  set_fact:
    cloudflared_service:
      name: cloudflared
      image: cloudflare/cloudflared:2026.6.0
      container_name: cloudflared
      command: tunnel --no-autoupdate run --token {{ cf_token }}
      labels:
        - "wud.link.template=https://github.com/cloudflare/cloudflared/releases"
      networks:
        - qnet
      restart: unless-stopped

- name: Setup Cloudflared directory
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/cloudflared"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
