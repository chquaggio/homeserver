---
- name: Configure mealie service
  set_fact:
    mealie_service:
      name: mealie
      image: ghcr.io/mealie-recipes/mealie:v3.19.2
      container_name: mealie
      restart: unless-stopped
      ports:
        - "9925:9000"
      volumes:
        - ./mealie-data:/app/data/
      environment:
        # Set Backend ENV Variables Here
        - "PUID={{ puid }}"
        - "PGID={{ pgid }}"
        - "TZ={{ tz }}"
        - ALLOW_SIGNUP=false
        - BASE_URL=https://mealie.fantaquoggio.bid
      networks:
        - qnet

- name: Setup Mealie directory
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/mealie-data"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
