---
- name: Configure jellyfin service
  set_fact:
    jellyfin_service:
      name: jellyfin
      image: jellyfin/jellyfin:10.11.11
      container_name: jellyfin
      ports:
        - 8096:8096
      devices:
        - /dev/dri/renderD128:/dev/dri/renderD128  # Intel N95 iGPU (QSV) for hardware transcoding
      group_add:
        - "{{ render_gid }}"  # host 'render' group GID, grants the container access to the render node
      volumes:
        - ./jellyfin/config:/config
        - ./jellyfin/cache:/cache
        - type: bind
          source: "{{ media_dir }}"
          target: "{{ media_dir }}"
      labels:
        - "wud.link.template=https://github.com/jellyfin/jellyfin/releases"
      networks:
        - qnet
      restart: unless-stopped

- name: Setup Jellyfin directories
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/jellyfin/{{ item }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
  loop:
    - "config"
    - "cache"
