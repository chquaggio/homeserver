---
# Diun — Docker Image Update Notifier. Replaces the archived containrrr/watchtower
# (read-only since 2025-12-17). Diun is purpose-built for NOTIFY-ONLY: it watches the
# running containers via the Docker provider and sends a Telegram message when a newer
# image is available. It never pulls or restarts anything.
#
# Image is pinned (not :latest) per the #5 maintenance rule — bump it deliberately and
# re-check the project is still maintained before each bump.
- name: Configure Diun (image update notifier, notify-only)
  set_fact:
    diun_service:
      name: diun
      image: crazymax/diun:4.33.0
      container_name: diun
      command: serve
      environment:
        - "TZ={{ tz }}"
        - LOG_LEVEL=info
        # Daily at 06:00 (Diun uses 5-field cron)
        - DIUN_WATCH_SCHEDULE=0 6 * * *
        - DIUN_WATCH_JITTER=30s
        - DIUN_WATCH_RUNONSTARTUP=true
        # Don't fire a notification for every image on the very first scan
        - DIUN_WATCH_FIRSTCHECKNOTIF=false
        # Watch every running container without needing per-container labels
        - DIUN_PROVIDERS_DOCKER=true
        - DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT=true
        # Repo-watch: also watch the whole repo for newer TAGS (not just the running
        # tag's digest), so pinned images surface "a newer version exists". Bounded to
        # the 10 highest semver tags per repo (FIRSTCHECKNOTIF=false keeps the initial
        # discovery silent).
        - DIUN_DEFAULTS_WATCHREPO=true
        - DIUN_DEFAULTS_MAXTAGS=10
        - DIUN_DEFAULTS_SORTTAGS=semver
        # Only notify on real version releases. excludeTags (not includeTags) so we keep
        # watching moving base tags like :17, :9, :latest, :release while dropping the
        # LinuxServer/dev noise: pre-releases (alpha/beta/rc/dev/nightly/snapshot),
        # numeric build tags (version-12345678), and -ls<build> variants.
        - 'DIUN_DEFAULTS_EXCLUDETAGS=(?i)(alpha|beta|rc[0-9]|dev|sha|git|nightly|snapshot|^version-|-ls[0-9]+)'
        # Telegram notifier — reuses the existing vault credentials
        - "DIUN_NOTIF_TELEGRAM_TOKEN={{ telegram_token }}"
        - "DIUN_NOTIF_TELEGRAM_CHATIDS={{ telegram_chat_id }}"
        # GHCR credentials so Diun can check the private ghcr.io/chquaggio/* images
        # (wishlist, spesatracker, mymcp); reuses the same PAT as ghcr_login.yml.
        - DIUN_REGOPTS_0_NAME=ghcr.io
        - DIUN_REGOPTS_0_SELECTOR=image
        - "DIUN_REGOPTS_0_USERNAME={{ ghcr_username }}"
        - "DIUN_REGOPTS_0_PASSWORD={{ ghcr_token }}"
      volumes:
        - ./diun/data:/data
        - /var/run/docker.sock:/var/run/docker.sock:ro
      networks:
        - qnet
      restart: unless-stopped

- name: Setup Diun directory
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/diun/data"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
