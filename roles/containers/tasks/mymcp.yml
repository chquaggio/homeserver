---
- name: Configure mymcp service
  set_fact:
    mymcp_service:
      name: mymcp
      image: ghcr.io/chquaggio/mymcp:latest
      container_name: mymcp
      restart: unless-stopped
      environment:
        - TRILIUM_TOKEN={{ trilium_token }}
        - TRILIUM_BASE_URL_PROD={{ trilium_url }}
        - ACTUAL_URL={{ actual_url }}
        - ACTUAL_PASSWORD={{ actual_password }}
        - ACTUAL_BUDGET={{ actual_budget }}
        # Expense inbox — Trilium note drained by process_expense_inbox + appended to by the Telegram listener
        - INBOX_NOTE_ID=01QOJvsxJbJU
        - EXPENSE_INBOX_ENABLED=true
        - TELEGRAM_BOT_TOKEN={{ telegram_token }}
        - TELEGRAM_CHAT_ID={{ telegram_chat_id }}
        - TZ=Europe/Rome
      ports:
        - 7000:7000
      networks:
        - qnet
