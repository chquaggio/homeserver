---
- name: Configure audiobookshelf service
  set_fact:
    audiobookshelf_service:
      name: audiobookshelf
      image: ghcr.io/advplyr/audiobookshelf:2.35.1
      container_name: audiobookshelf
      ports:
        - 13378:80
      volumes:
        - "{{ media_dir }}/books:/audiobooks"
        - "{{ media_dir }}/pdfs:/pdfs"
        - ./audiobookshelf/podcasts:/podcasts
        - ./audiobookshelf/config:/config
        - ./audiobookshelf/metadata:/metadata
      environment:
        - "TZ={{ tz }}"
      labels:
        - "wud.link.template=https://github.com/advplyr/audiobookshelf/releases"
      networks:
        - qnet
      restart: unless-stopped

- name: Setup audiobookshelf directories
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/audiobookshelf/{{ item }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
  loop:
    # - "audiobooks"
    - "podcasts"
    - "config"
    - "metadata"
