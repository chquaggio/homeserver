---
# Immich requires its own Postgres (custom image with vectorchord extension)
# and a Redis-compatible cache. Official compose reference:
# https://github.com/immich-app/immich/releases/latest/download/docker-compose.yml
- name: Configure Immich server service
  set_fact:
    immich_service:
      name: immich-server
      image: ghcr.io/immich-app/immich-server:v3.0.1
      container_name: immich-server
      depends_on:
        - immich-redis
        - immich-postgres
      ports:
        - "2283:2283"
      volumes:
        - "{{ media_dir }}/immich:/data"
        - /etc/localtime:/etc/localtime:ro
      environment:
        - DB_HOSTNAME=immich-postgres
        - DB_USERNAME=postgres
        - "DB_PASSWORD={{ immich_db_password }}"
        - DB_DATABASE_NAME=immich
        - REDIS_HOSTNAME=immich-redis
        - "TZ={{ tz }}"
      networks:
        - qnet
      restart: unless-stopped

- name: Configure Immich machine learning service
  set_fact:
    immich_ml_service:
      name: immich-machine-learning
      image: ghcr.io/immich-app/immich-machine-learning:v3.0.1
      container_name: immich-machine-learning
      volumes:
        - ./immich/model-cache:/cache
      networks:
        - qnet
      restart: unless-stopped

- name: Configure Immich redis service
  set_fact:
    immich_redis_service:
      name: immich-redis
      image: docker.io/valkey/valkey:9.0.4
      container_name: immich-redis
      networks:
        - qnet
      restart: unless-stopped

- name: Configure Immich postgres service
  set_fact:
    immich_postgres_service:
      name: immich-postgres
      image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
      container_name: immich-postgres
      shm_size: 128mb
      environment:
        - POSTGRES_USER=postgres
        - "POSTGRES_PASSWORD={{ immich_db_password }}"
        - POSTGRES_DB=immich
        - POSTGRES_INITDB_ARGS=--data-checksums
      volumes:
        - ./immich/postgres_data:/var/lib/postgresql/data
      networks:
        - qnet
      restart: unless-stopped

# Logical dump sidecar for Immich's Postgres (faces, albums, metadata — NOT the photo
# files, which live at {{ media_dir }}/immich). Restoring requires a compatible
# vectorchord/pgvecto.rs extension version, so the dump must be restored into the same
# image tag used above: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
# The backup image major version (14) is pinned to match that server.
- name: Configure Immich Postgres backup sidecar
  set_fact:
    immich_db_backup_service:
      name: immich-db-backup
      image: prodrigestivill/postgres-backup-local:14
      container_name: immich-db-backup
      depends_on:
        - immich-postgres
      environment:
        - POSTGRES_HOST=immich-postgres
        - POSTGRES_DB=immich
        - POSTGRES_USER=postgres
        - "POSTGRES_PASSWORD={{ immich_db_password }}"
        - POSTGRES_EXTRA_OPTS=--clean --if-exists
        - SCHEDULE=@daily
        - BACKUP_KEEP_DAYS=14
        - BACKUP_KEEP_WEEKS=8
        - BACKUP_KEEP_MONTHS=12
        - "TZ={{ tz }}"
      volumes:
        - ./immich/db-backups:/backups
      networks:
        - qnet
      restart: unless-stopped

- name: Setup Immich directories
  ansible.builtin.file:
    path: "{{ item }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
  loop:
    - "{{ media_dir }}/immich"
    - "{{ docker_compose_dir }}/immich/model-cache"
    - "{{ docker_compose_dir }}/immich/db-backups"
