---
- name: Configure Sonarr service
  set_fact:
    sonarr_service:
      name: sonarr
      image: lscr.io/linuxserver/sonarr:4.0.17
      container_name: sonarr
      ports:
        - 8989:8989
      volumes:
        - ./sonarr/config:/config
        - "{{ media_dir }}/Shows:/tv"
        - "{{ media_dir }}/downloads:/downloads"
      networks:
        - qnet
      restart: unless-stopped
      environment:
        - "PUID={{ puid }}"
        - "PGID={{ pgid }}"
        - "TZ={{ tz }}"

- name: Setup Sonarr directories
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/sonarr/{{ item }}"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
  loop:
    - "config"
