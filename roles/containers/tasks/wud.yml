---
# Image-update notifier with a web dashboard (:3004) and per-image changelog links
# (wud.link.template label on each service). Notify-only: no update trigger is
# configured, so it never pulls or restarts containers.
- name: Configure WUD (What's Up Docker — update dashboard + notifier)
  set_fact:
    wud_service:
      name: wud
      image: getwud/wud:8.2.2
      container_name: wud
      ports:
        - "3004:3000"
      environment:
        - "TZ={{ tz }}"
        - WUD_LOG_LEVEL=info
        # Watch every running container, scan daily at 06:00
        - WUD_WATCHER_LOCAL_WATCHBYDEFAULT=true
        - "WUD_WATCHER_LOCAL_CRON=0 6 * * *"
        - "WUD_TRIGGER_TELEGRAM_1_BOTTOKEN={{ telegram_token }}"
        - "WUD_TRIGGER_TELEGRAM_1_CHATID={{ telegram_chat_id }}"
        # Auth for the private ghcr.io/chquaggio/* images (needs read:packages)
        - "WUD_REGISTRY_GHCR_PRIVATE_USERNAME={{ ghcr_username }}"
        - "WUD_REGISTRY_GHCR_PRIVATE_TOKEN={{ ghcr_token }}"
      volumes:
        - ./wud/data:/store
        - /var/run/docker.sock:/var/run/docker.sock:ro
      networks:
        - qnet
      restart: unless-stopped

- name: Setup WUD directory
  ansible.builtin.file:
    path: "{{ docker_compose_dir }}/wud/data"
    owner: "{{ username }}"
    group: "{{ username }}"
    state: directory
